# Только Earth-2 NIM: FourCastNet + CorrDiff (без FLUX и PyG).
# Запуск: export NGC_API_KEY=ваш_ключ && docker compose -f docker-compose.nim-earth2.yml up -d

services:
  fourcastnet:
    image: nvcr.io/nim/nvidia/fourcastnet:latest
    runtime: nvidia
    ports:
      - "8001:8000"
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
    shm_size: "4g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  corrdiff:
    image: nvcr.io/nim/nvidia/corrdiff:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
    shm_size: "4g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: pfrp-nim-earth2
