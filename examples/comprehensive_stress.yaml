metadata:
  scenario_id: "comprehensive_stress_2024"
  name: "Comprehensive Stress Scenario 2024"
  description: "Multi-factor stress scenario with interest rate, FX, and equity shocks"
  author: "Risk Team"
  created_at: "2024-01-15T10:00:00Z"
  tags:
    - "stress-test"
    - "comprehensive"
    - "2024"
  version: "1.0.0"

portfolio:
  portfolio_id: "demo_portfolio"
  as_of_date: "2024-01-15T00:00:00Z"

market_shocks:
  - type: interest_rate
    asset_class: "usd_rates"
    shock_value: 0.025
    shock_type: "absolute"
    description: "250 bps parallel shift in USD yield curve"
    effective_date: "2024-01-15T00:00:00Z"
  
  - type: fx
    asset_class: "eur_usd"
    shock_value: -0.10
    shock_type: "relative"
    description: "10% EUR depreciation vs USD"
    effective_date: "2024-01-15T00:00:00Z"
  
  - type: equity
    asset_class: "sp500"
    shock_value: -0.20
    shock_type: "relative"
    description: "20% decline in S&P 500"
    effective_date: "2024-01-15T00:00:00Z"

regulatory_rules:
  - framework: BASEL_IV
    jurisdiction: US_FED
    rule_version: "latest"
    parameters:
      min_cet1_ratio: 0.045
    enabled: true
  
  - framework: LCR
    jurisdiction: US_FED
    rule_version: "latest"
    parameters:
      min_lcr: 1.0
    enabled: true

calculation_steps:
  - step_id: "apply_shocks"
    step_type: "market_shock"
    inputs: []
    parameters: {}
  
  - step_id: "basel_iv_calc"
    step_type: "regulatory_calculation"
    inputs: ["apply_shocks"]
    parameters: {}
    rule:
      framework: BASEL_IV
      jurisdiction: US_FED
      rule_version: "latest"
      enabled: true
  
  - step_id: "lcr_calc"
    step_type: "regulatory_calculation"
    inputs: ["apply_shocks"]
    parameters: {}
    rule:
      framework: LCR
      jurisdiction: US_FED
      rule_version: "latest"
      enabled: true

outputs:
  - "basel_iv_calc"
  - "lcr_calc"

