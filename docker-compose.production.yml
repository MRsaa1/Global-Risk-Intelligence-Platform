version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: risk_platform
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    # Port not exposed externally - only used internally
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=production
      - PORT=9002
      - DATABASE_URL=postgresql://risk_user:${DB_PASSWORD}@postgres:5432/risk_platform
      - REDIS_URL=redis://redis:6379
      - REG_CALCULATOR_URL=http://reg-calculator-api:8080
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  reg-calculator-api:
    build:
      context: .
      dockerfile: apps/reg-calculator/Dockerfile
    # Port not exposed externally - only used internally via API Gateway
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://risk_user:${DB_PASSWORD}@postgres:5432/risk_platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  control-tower:
    build:
      context: ./apps/control-tower
      dockerfile: Dockerfile
    ports:
      - "9010:9010"
    environment:
      - VITE_API_URL=http://${SERVER_IP}:9002
    depends_on:
      - api-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres-data:
  redis-data:

