name: Production Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Version to deploy'
        required: true
        type: string
      confirm:
        description: 'Type "DEPLOY" to confirm'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate inputs
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "❌ Deployment not confirmed"
            exit 1
          fi
          echo "✅ Deployment confirmed"

      - name: Run tests
        run: |
          echo "Running tests..."
          # Add your test commands here

  build:
    name: Build Images
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Reg Calculator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/reg-calculator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reg-calculator:${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reg-calculator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
      
      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=./kubeconfig
          
          # Update image tags
          sed -i "s|image:.*api-gateway.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.event.inputs.version }}|g" infra/k8s/api-gateway-deployment.yaml
          sed -i "s|image:.*reg-calculator.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reg-calculator:${{ github.event.inputs.version }}|g" infra/k8s/reg-calculator-deployment.yaml
          
          # Apply deployments
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/api-gateway-deployment.yaml
          kubectl apply -f infra/k8s/reg-calculator-deployment.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/api-gateway -n risk-platform --timeout=5m
          kubectl rollout status deployment/reg-calculator-api -n risk-platform --timeout=5m
      
      - name: Verify Deployment
        run: |
          export KUBECONFIG=./kubeconfig
          kubectl get pods -n risk-platform
          kubectl get svc -n risk-platform

  notify:
    name: Notify Team
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
          # Add Slack/Email notification here

