<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Risk Alerts</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0a0e17; color: #e4e4e7; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; text-align: center; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #a1a1aa; font-size: 0.875rem; max-width: 320px; }
    #cached-alerts { margin-top: 1rem; text-align: left; max-width: 360px; font-size: 0.8125rem; color: #71717a; }
    .alert-item { padding: 0.5rem 0; border-bottom: 1px solid #27272a; }
    a { color: #60a5fa; }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>Early warning alerts are available when you're back online. This page is cached for offline viewing.</p>
  <div id="cached-alerts">
    <p>No cached alerts. Open the app while online to cache the latest alerts for your community.</p>
  </div>
  <p style="margin-top: 1.5rem;"><a href="/">Try again</a></p>
  <script>
    try {
      var stored = localStorage.getItem('pfrp_alerts_cache');
      if (stored) {
        var data = JSON.parse(stored);
        var html = (data.alerts || []).slice(0, 10).map(function(a) {
          return '<div class="alert-item">' + (a.title || a.type || 'Alert') + ': ' + (a.summary || a.message || '') + '</div>';
        }).join('');
        document.getElementById('cached-alerts').innerHTML = html || '<p>No cached alerts.</p>';
      }
    } catch (e) {}
  </script>
</body>
</html>
