<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8962e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b8962e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="200" fill="#080808"/>

  <!-- ==================== GLOBE (centered vertically at y=100) ==================== -->
  <circle cx="100" cy="100" r="72" fill="url(#globeGlow)"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#b8962e" stroke-width="0.9" opacity="0.45"/>

  <!-- Latitude lines -->
  <ellipse cx="100" cy="100" rx="70" ry="15" fill="none" stroke="#b8962e" stroke-width="0.6" opacity="0.28"/>
  <ellipse cx="100" cy="100" rx="61" ry="37" fill="none" stroke="#b8962e" stroke-width="0.6" opacity="0.22"/>
  <ellipse cx="100" cy="100" rx="42" ry="54" fill="none" stroke="#b8962e" stroke-width="0.6" opacity="0.22"/>
  <ellipse cx="100" cy="100" rx="17" ry="67" fill="none" stroke="#b8962e" stroke-width="0.6" opacity="0.22"/>

  <!-- Longitude arcs -->
  <path d="M100,30 Q174,100 100,170" fill="none" stroke="#b8962e" stroke-width="0.6" opacity="0.22"/>
  <path d="M100,30 Q26,100 100,170" fill="none" stroke="#b8962e" stroke-width="0.6" opacity="0.22"/>

  <!-- Network nodes -->
  <circle cx="100" cy="38"  r="4"   fill="#b8962e" filter="url(#glow)"/>
  <circle cx="148" cy="62"  r="3"   fill="#b8962e" opacity="0.88"/>
  <circle cx="160" cy="108" r="3.5" fill="#b8962e" filter="url(#glow)"/>
  <circle cx="136" cy="150" r="3"   fill="#b8962e" opacity="0.85"/>
  <circle cx="64"  cy="150" r="3"   fill="#b8962e" opacity="0.85"/>
  <circle cx="40"  cy="108" r="3.5" fill="#b8962e" filter="url(#glow)"/>
  <circle cx="52"  cy="62"  r="3"   fill="#b8962e" opacity="0.88"/>
  <circle cx="100" cy="100" r="5"   fill="#b8962e" filter="url(#glow)"/>

  <!-- Outer ring connections -->
  <g opacity="0.5">
    <line x1="100" y1="38"  x2="148" y2="62"  stroke="#b8962e" stroke-width="1.1"/>
    <line x1="148" y1="62"  x2="160" y2="108" stroke="#b8962e" stroke-width="1.1"/>
    <line x1="160" y1="108" x2="136" y2="150" stroke="#b8962e" stroke-width="1.1"/>
    <line x1="136" y1="150" x2="64"  y2="150" stroke="#b8962e" stroke-width="1.1"/>
    <line x1="64"  y1="150" x2="40"  y2="108" stroke="#b8962e" stroke-width="1.1"/>
    <line x1="40"  y1="108" x2="52"  y2="62"  stroke="#b8962e" stroke-width="1.1"/>
    <line x1="52"  y1="62"  x2="100" y2="38"  stroke="#b8962e" stroke-width="1.1"/>
  </g>

  <!-- Spokes to center -->
  <g opacity="0.45">
    <line x1="100" y1="38"  x2="100" y2="100" stroke="#b8962e" stroke-width="0.9"/>
    <line x1="148" y1="62"  x2="100" y2="100" stroke="#b8962e" stroke-width="0.9"/>
    <line x1="160" y1="108" x2="100" y2="100" stroke="#b8962e" stroke-width="0.9"/>
    <line x1="136" y1="150" x2="100" y2="100" stroke="#b8962e" stroke-width="0.9"/>
    <line x1="64"  y1="150" x2="100" y2="100" stroke="#b8962e" stroke-width="0.9"/>
    <line x1="40"  y1="108" x2="100" y2="100" stroke="#b8962e" stroke-width="0.9"/>
    <line x1="52"  y1="62"  x2="100" y2="100" stroke="#b8962e" stroke-width="0.9"/>
  </g>

  <!-- Cross connections -->
  <g opacity="0.2">
    <line x1="100" y1="38"  x2="160" y2="108" stroke="#b8962e" stroke-width="0.7"/>
    <line x1="148" y1="62"  x2="136" y2="150" stroke="#b8962e" stroke-width="0.7"/>
    <line x1="160" y1="108" x2="64"  y2="150" stroke="#b8962e" stroke-width="0.7"/>
    <line x1="136" y1="150" x2="40"  y2="108" stroke="#b8962e" stroke-width="0.7"/>
    <line x1="64"  y1="150" x2="52"  y2="62"  stroke="#b8962e" stroke-width="0.7"/>
    <line x1="40"  y1="108" x2="100" y2="38"  stroke="#b8962e" stroke-width="0.7"/>
  </g>

  <!-- ==================== VERTICAL DIVIDER ==================== -->
  <line x1="196" y1="30" x2="196" y2="170" stroke="#b8962e" stroke-width="0.8" opacity="0.35"/>

  <!-- ==================== SAA + ALLIANCE (center block, y=100) ==================== -->
  <text x="375" y="90" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="62" font-weight="700" 
        fill="#f0ece0" text-anchor="middle" letter-spacing="10">SAA</text>

  <line x1="240" y1="106" x2="510" y2="106" stroke="#b8962e" stroke-width="1.6"/>

  <text x="375" y="142" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="26" font-weight="400" 
        fill="#b8962e" text-anchor="middle" letter-spacing="13">ALLIANCE</text>

  <!-- ==================== VERTICAL DIVIDER 2 ==================== -->
  <line x1="556" y1="30" x2="556" y2="170" stroke="#b8962e" stroke-width="0.8" opacity="0.35"/>

  <!-- ==================== RIGHT TEXT BLOCK ==================== -->
  <text x="728" y="88" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="13" fill="#f0ece0" opacity="0.85" 
        text-anchor="middle" letter-spacing="3">SCIENTIFIC ANALYTICS ALLIANCE</text>

  <line x1="572" y1="100" x2="884" y2="100" stroke="#b8962e" stroke-width="0.7" opacity="0.4"/>

  <text x="728" y="118" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="11" fill="#b8962e" opacity="0.75" 
        text-anchor="middle" letter-spacing="2">AI-Powered Research &amp; Risk Intelligence</text>

</svg>
