# Logrotate config for PFRP/Global Risk Platform API.
# Copy to server: sudo cp infra/logrotate/pfrp-api.conf /etc/logrotate.d/pfrp-api
# Or symlink from repo: sudo ln -s /path/to/global-risk-platform/infra/logrotate/pfrp-api.conf /etc/logrotate.d/pfrp-api
#
# API writes to /tmp/api.log by default (see DEPLOY.md). Adjust path if you use another.

/tmp/api.log {
    daily
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}

# Optional: frontend log if served from same host
/tmp/web.log {
    daily
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}
