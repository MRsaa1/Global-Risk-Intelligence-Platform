apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
  namespace: risk-platform
  labels:
    app: ray-head
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ray-head
  template:
    metadata:
      labels:
        app: ray-head
    spec:
      containers:
      - name: ray-head
        image: rayproject/ray:latest
        command: ["ray", "start", "--head", "--port=6379", "--dashboard-host=0.0.0.0"]
        ports:
        - containerPort: 6379
        - containerPort: 8265
        - containerPort: 10001
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
---
apiVersion: v1
kind: Service
metadata:
  name: ray-head
  namespace: risk-platform
spec:
  selector:
    app: ray-head
  ports:
  - name: ray
    port: 6379
  - name: dashboard
    port: 8265
  - name: client
    port: 10001

