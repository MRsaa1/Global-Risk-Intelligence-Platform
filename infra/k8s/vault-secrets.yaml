# Example: API Gateway with Vault secret injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: risk-platform
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "risk-platform"
    vault.hashicorp.com/agent-inject-secret-database: "secret/data/risk-platform/database"
    vault.hashicorp.com/agent-inject-template-database: |
      {{- with secret "secret/data/risk-platform/database" -}}
      export DATABASE_URL="postgresql://{{ .Data.data.username }}:{{ .Data.data.password }}@{{ .Data.data.host }}:5432/{{ .Data.data.database }}"
      {{- end }}
    vault.hashicorp.com/agent-inject-secret-redis: "secret/data/risk-platform/redis"
    vault.hashicorp.com/agent-inject-template-redis: |
      {{- with secret "secret/data/risk-platform/redis" -}}
      export REDIS_URL="redis://:{{ .Data.data.password }}@{{ .Data.data.host }}:6379"
      {{- end }}
    vault.hashicorp.com/agent-inject-secret-jwt: "secret/data/risk-platform/jwt"
    vault.hashicorp.com/agent-inject-template-jwt: |
      {{- with secret "secret/data/risk-platform/jwt" -}}
      export JWT_SECRET="{{ .Data.data.secret }}"
      {{- end }}
spec:
  # ... rest of deployment spec

