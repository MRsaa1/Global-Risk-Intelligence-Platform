apiVersion: v1
kind: Namespace
metadata:
  name: vault
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      containers:
      - name: vault
        image: hashicorp/vault:1.15.0
        args:
          - server
        ports:
        - containerPort: 8200
          name: http
        env:
        - name: VAULT_ADDR
          value: "https://0.0.0.0:8200"
        - name: VAULT_LOCAL_CONFIG
          value: |
            storage "file" {
              path = "/vault/data"
            }
            listener "tcp" {
              address = "0.0.0.0:8200"
              tls_cert_file = "/vault/certs/vault.crt"
              tls_key_file = "/vault/certs/vault.key"
            }
        volumeMounts:
        - name: vault-data
          mountPath: /vault/data
        - name: vault-certs
          mountPath: /vault/certs
        - name: vault-logs
          mountPath: /vault/logs
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
spec:
  selector:
    app: vault
  ports:
  - port: 8200
    targetPort: 8200
  type: ClusterIP
---
# Vault Agent Injector for automatic secret injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-agent-injector
  namespace: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-agent-injector
  template:
    metadata:
      labels:
        app: vault-agent-injector
    spec:
      serviceAccountName: vault-agent-injector
      containers:
      - name: agent-injector
        image: hashicorp/vault-k8s:1.1.0
        args:
          - agent-injector
        env:
        - name: VAULT_ADDR
          value: "http://vault:8200"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

