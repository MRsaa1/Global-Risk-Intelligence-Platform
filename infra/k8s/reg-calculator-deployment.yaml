apiVersion: apps/v1
kind: Deployment
metadata:
  name: reg-calculator
  namespace: risk-platform
  labels:
    app: reg-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reg-calculator
  template:
    metadata:
      labels:
        app: reg-calculator
    spec:
      containers:
      - name: reg-calculator
        image: global-risk-platform/reg-calculator:latest
        env:
        - name: RAY_ADDRESS
          value: "ray://ray-head:10001"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: risk-platform-secrets
              key: redis-url
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: reg-calculator
  namespace: risk-platform
spec:
  selector:
    app: reg-calculator
  ports:
  - port: 8080
    targetPort: 8080

