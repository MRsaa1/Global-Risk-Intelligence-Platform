version: '3.8'

# Production Docker Compose for risk.saa-alliance.com
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f api
#
# .env in apps/api/.env is NOT overwritten — keys and secrets are preserved.
# Database (SQLite) is persisted via the api-data volume.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    expose:
      - "9002"
    env_file:
      - apps/api/.env
    environment:
      - DATABASE_URL=sqlite:///./data/prod.db
      - USE_SQLITE=true
      - DEBUG=false
      - ENABLE_NEO4J=false
      - CORS_ORIGINS=["https://risk.saa-alliance.com"]
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_LLM_API_KEY=${NVIDIA_LLM_API_KEY:-}
      - NOAA_API_TOKEN=${NOAA_API_TOKEN:-}
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  api-data:

networks:
  default:
    name: pfrp-network
