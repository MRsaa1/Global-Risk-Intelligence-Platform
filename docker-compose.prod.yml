version: '3.8'

# Production Docker Compose for risk.saa-alliance.com

services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "9002:9002"
    environment:
      - DATABASE_URL=sqlite:///./data/prod.db
      - USE_SQLITE=true
      - DEBUG=false
      - CORS_ORIGINS=["https://risk.saa-alliance.com"]
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_LLM_API_KEY=${NVIDIA_LLM_API_KEY:-}
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (built static files served by nginx)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5180:80"
    restart: unless-stopped

volumes:
  api-data:

networks:
  default:
    name: pfrp-network
